name: t_store
description: "T Store"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8
  cached_network_image: ^3.4.1
  capped_progress_indicator: ^0.0.2
  carousel_slider: ^5.0.0
  flutter_native_splash: ^2.4.4
  flutter_rating_bar: ^4.0.1
  smooth_page_indicator: ^2.0.1
  flutter_launcher_icons: ^0.14.3
  shimmer: ^3.0.0
  lottie: ^3.3.1
  readmore: ^3.0.0
  qr_flutter: ^4.1.0

  # State Management & DI
  flutter_bloc: ^9.1.1
  get_it: ^9.2.0
  equatable: ^2.0.7

  # Backend - Supabase
  supabase_flutter: ^2.8.3

  # Network & Data
  dartz: ^0.10.1
  dio: ^5.9.0
  http: ^1.3.0

  # Storage
  shared_preferences: ^2.5.3
  image_picker: ^1.1.2

  # Utils
  intl: ^0.20.2
  logger: ^2.5.0
  url_launcher: ^6.3.1
  flutter_dotenv: ^6.0.0

  # Location
  geolocator: ^14.0.0
  geocoding: ^4.0.0
  permission_handler: ^12.0.0+1

  # Payments (for future use)
  # flutter_stripe: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  bloc_test: ^10.0.0  


flutter:

  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - .env
    - assets/images/animations/
    - assets/images/banners/
    - assets/images/products/
    - assets/images/reviews/
    - assets/images/on_boarding_images/
    - assets/images/content/
    - assets/icons/categories/
    - assets/icons/brands/
    - assets/icons/payment_methods/
    - assets/images/
    - assets/logos/
  fonts:
    - family: Coolvetica
      fonts:
        - asset: assets/fonts/coolvetica_regular.otf
        - asset: assets/fonts/coolvetica_regular_italic.otf
          style: italic
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Italic.ttf
          style: italic
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Poppins-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-LightItalic.ttf
          weight: 300
          style: italic
